<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plano Cartesiano Dinámico</title>
</head>

<body>
  <h2>Gráfico de Puntos en Movimiento</h2>
  <canvas id="planoCanvas" width="500" height="500" style="border:4px solid black; background-color: #f0f0f0;"></canvas>

  <script>

    //definicion de variables
    var canvas = document.getElementById("planoCanvas");
    var ctx = canvas.getContext("2d");
    var puntos = [
      {x: 100, y: 100, color: "red"},
      {x: 200, y: 300, color: "blue"},
      {x: 400, y: 150, color: "green"},
      {x: 50, y: 400, color: "orange"},
      {x: 300, y: 250, color: "purple"}
    ];

    function actualizarPlano() {
      // limpiar
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // simular movimiento para cada punto
      puntos.forEach(function (punto) {
        // 20 px+-
        punto.x += (Math.random() * 40 - 20);
        punto.y += (Math.random() * 40 - 20);

        // dibujar circulos
        ctx.beginPath();
        ctx.arc(punto.x, punto.y, 8, 0, Math.PI * 2);
        ctx.fillStyle = punto.color;
        ctx.fill();
        ctx.stroke();
      });
    }

    // Ejecutar la actualización cada segundo
    setInterval(actualizarPlano, 1000);

    // Llamada inicial
    actualizarPlano();
  </script>
</body>

</html>
