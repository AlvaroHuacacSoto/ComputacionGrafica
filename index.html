<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Repo Explorer | ThinkPad Edition</title>
  <style>
    body {
      font-family: 'JetBrains Mono', monospace;
      background-color: #000;
      color: #fff;
      padding: 30px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      border: 1px solid #333;
      padding: 20px;
      border-radius: 4px;
    }

    .item {
      padding: 12px;
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      align-items: center;
      transition: 0.2s;
    }

    .item:hover {
      background-color: #111;
    }

    .directory {
      color: #750202;
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
    }

    .file {
      color: #aaa;
      text-decoration: none;
      flex-grow: 1;
    }

    .file:hover {
      color: #fff;
    }

    .breadcrumb {
      margin-bottom: 25px;
      font-size: 0.9em;
      border-left: 3px solid #750202;
      padding-left: 15px;
    }

    .error-msg {
      color: #ff0000;
      background: #200;
      padding: 15px;
      border: 1px solid #750202;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <div class="container">
    <div id="breadcrumb" class="breadcrumb"></div>
    <div id="explorer">Iniciando sistema...</div>
  </div>

  <script>
    const USER = 'AlvaroHuacacSoto';
    const REPO = 'ComputacionGrafica';
    const BRANCH = 'master';

    async function loadRepo(path = "") {
      const explorer = document.getElementById('explorer');
      const breadcrumb = document.getElementById('breadcrumb');

      breadcrumb.innerHTML = `<span onclick="loadRepo('')" style="cursor:pointer;color:#750202">root</span> / ${path}`;

      try {
        const url = `https://api.github.com/repos/${USER}/${REPO}/contents/${path}?ref=${BRANCH}`;
        const response = await fetch(url);

        if (!response.ok) {
          const errorData = await response.json();
          console.error("Detalle del error:", errorData);
          throw new Error(errorData.message);
        }

        const data = await response.json();
        explorer.innerHTML = "";

        if (path !== "") {
          const upDir = path.split('/').slice(0, -1).join('/');
          explorer.innerHTML += `<div class="item directory" onclick="loadRepo('${upDir}')">.. [REGRESAR]</div>`;
        }

        // Separar carpetas de archivos
        data.sort((a, b) => (b.type === 'dir') - (a.type === 'dir'));

        data.forEach(item => {
          const div = document.createElement('div');
          div.className = 'item';

          if (item.type === 'dir') {
            div.innerHTML = `<span class="directory" onclick="loadRepo('${item.path}')">DIR_ ${item.name}</span>`;
          } else {
            // Evitamos listar el propio index.html si quieres un look más limpio
            if (item.name === 'index.html') return;

            const rawUrl = `https://${USER}.github.io/${REPO}/${item.path}`;
            div.innerHTML = `<a class="file" href="${rawUrl}" target="_blank">FILE_ ${item.name}</a>`;
          }
          explorer.append(div);
        });

      } catch (err) {
        explorer.innerHTML = `
                <div class="error-msg">
                    <strong>SYSTEM ERROR:</strong> ${err.message}<br><br>
                    <small>Causas probables: Repo privado, nombre de repo incorrecto o límite de API excedido.</small>
                </div>`;
      }
    }

    loadRepo();
  </script>
</body>

</html>
