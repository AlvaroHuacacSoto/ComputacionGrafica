<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Repo Alvaro Huacac Soto</title>
  <style>
    /* Estilos Base - Estética ThinkPad / Monospace */
    body {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      background-color: #000;
      color: #fff;
      margin: 0;
      line-height: 1.5;
      display: flex;
      height: 100vh;
      overflow: hidden; /* Evita el scroll en el body, se delega a los paneles */
    }

    /* Barra Lateral (Explorador) */
    .sidebar {
      width: 350px;
      min-width: 250px;
      background-color: #050505;
      border-right: 1px solid #1a1a1a;
      display: flex;
      flex-direction: column;
      padding: 20px;
      overflow-y: auto;
      box-shadow: 4px 0 15px rgba(0, 0, 0, 0.5);
    }

    /* Área de Visualización Principal */
    .main-content {
      flex: 1;
      background-color: #000;
      display: flex;
    }

    #viewer {
      width: 100%;
      height: 100%;
      border: none;
      background-color: #fff; /* Fondo blanco por defecto para los HTML renderizados, ajustable según necesidad */
    }

    /* Breadcrumb (Navegación de ruta) */
    .breadcrumb {
      margin-bottom: 20px;
      font-size: 0.9em;
      border-left: 3px solid #750202;
      padding-left: 15px;
      color: #888;
    }

    .breadcrumb span {
      cursor: pointer;
      color: #750202;
      transition: 0.2s;
    }

    .breadcrumb span:hover {
      color: #fff;
      text-decoration: underline;
    }

    /* Elementos del Explorador */
    #explorer {
      display: flex;
      flex-direction: column;
    }

    .item {
      padding: 10px 10px;
      border-bottom: 1px solid #111;
      display: flex;
      align-items: center;
      transition: 0.2s;
      text-decoration: none;
      color: inherit;
    }

    .item:hover {
      background-color: #111;
    }

    .item:last-child {
      border-bottom: none;
    }

    /* Estilos de Iconos y Texto */
    .icon {
      width: 18px;
      height: 18px;
      margin-right: 12px;
      flex-shrink: 0;
    }

    .directory {
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }

    .file {
      color: #aaa;
      text-decoration: none;
      flex-grow: 1;
      display: flex;
      align-items: center;
    }

    .file:hover {
      color: #fff;
    }

    /* Icono "Regresar" */
    .up-dir {
      color: #750202;
      cursor: pointer;
    }

    .up-dir .icon {
      fill: #750202;
    }

    /* Mensajes de Error y Carga */
    .error-msg {
      color: #ff4444;
      background: rgba(117, 2, 2, 0.1);
      padding: 15px;
      border: 1px solid #750202;
      margin-top: 15px;
      border-radius: 2px;
      font-size: 0.85em;
    }

    .loading {
      color: #666;
      font-style: italic;
      text-align: center;
      padding: 20px;
      font-size: 0.9em;
    }
  </style>
</head>

<body>

  <div class="sidebar">
    <div id="breadcrumb" class="breadcrumb"></div>
    <div id="explorer">
      <div class="loading">Iniciando sistema...</div>
    </div>
  </div>

  <div class="main-content">
    <iframe id="viewer" name="viewer" src="about:blank" title="Visor de archivos"></iframe>
  </div>

  <script>
    const USER = 'AlvaroHuacacSoto';
    const REPO = 'ComputacionGrafica';
    const BRANCH = 'master';
    const CACHE_TIME = 300000;

    const icons = {
      dir: `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>`,
      file: `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path><polyline points="13 2 13 9 20 9"></polyline></svg>`,
      up: `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 10 4 15 9 20"></polyline><path d="M20 4v7a4 4 0 0 1-4 4H4"></path></svg>`
    };

    function clearCacheAndReload(path) {
      Object.keys(localStorage).forEach(key => {
        if (key.startsWith('repo_cache_')) {
          localStorage.removeItem(key);
        }
      });
      loadRepo(path, true);
    }

    async function loadRepo(path = "", forceRefresh = false) {
      const explorer = document.getElementById('explorer');
      const breadcrumb = document.getElementById('breadcrumb');
      const cacheKey = `repo_cache_${path}`;

      explorer.innerHTML = `<div class="loading">Sincronizando con GitHub...</div>`;

      breadcrumb.innerHTML = `<span onclick="loadRepo('')">root</span>` +
        (path ? ' / ' + path.split('/').map((p, i, arr) =>
          `<span onclick="loadRepo('${arr.slice(0, i + 1).join('/')}')">${p}</span>`
        ).join(' / ') : '') +
        `<span style="float:right; color:#750202; cursor:pointer; font-weight:bold;" onclick="clearCacheAndReload('${path}')" title="Forzar lectura en vivo">[ REF ]</span>`;

      if (!forceRefresh) {
        const cachedData = localStorage.getItem(cacheKey);
        if (cachedData) {
          const {data, timestamp} = JSON.parse(cachedData);
          if (Date.now() - timestamp < CACHE_TIME) {
            renderData(data, path);
            return;
          }
        }
      }

      try {
        const timeStampQuery = forceRefresh ? `&t=${new Date().getTime()}` : '';
        const url = `https://api.github.com/repos/${USER}/${REPO}/contents/${path}?ref=${BRANCH}${timeStampQuery}`;
        const fetchOptions = forceRefresh ? {cache: 'no-store'} : {};
        const response = await fetch(url, fetchOptions);

        if (!response.ok) {
          const cachedData = localStorage.getItem(cacheKey);
          if (response.status === 403 && cachedData) {
            console.warn("Límite excedido. Usando datos guardados.");
            renderData(JSON.parse(cachedData).data, path);
            return;
          }
          throw new Error((await response.json()).message);
        }

        const data = await response.json();

        localStorage.setItem(cacheKey, JSON.stringify({
          data: data,
          timestamp: Date.now()
        }));

        renderData(data, path);

      } catch (err) {
        explorer.innerHTML = `
                <div class="error-msg">
                    <strong>SYSTEM ERROR:</strong> ${err.message}<br><br>
                    <small>Límite de API o error de conexión.</small>
                </div>`;
      }
    }

    function renderData(data, path) {
      const explorer = document.getElementById('explorer');
      explorer.innerHTML = "";

      if (path !== "") {
        const upDir = path.split('/').slice(0, -1).join('/');
        const div = document.createElement('div');
        div.className = 'item up-dir directory';
        div.onclick = () => loadRepo(upDir);
        div.innerHTML = `${icons.up}<span>..</span>`;
        explorer.append(div);
      }

      data.sort((a, b) => {
        if (a.type === 'dir' && b.type !== 'dir') return -1;
        if (a.type !== 'dir' && b.type === 'dir') return 1;
        return a.name.localeCompare(b.name);
      });

      data.forEach(item => {
        if (item.name === 'index.html') return;
        const div = document.createElement('div');
        div.className = 'item';

        if (item.type === 'dir') {
          div.classList.add('directory');
          div.onclick = () => loadRepo(item.path);
          div.innerHTML = `${icons.dir}<span>${item.name}</span>`;
        } else {
          const rawUrl = `https://${USER}.github.io/${REPO}/${item.path}`;
          // CAMBIO PRINCIPAL: target="viewer" envía el enlace al iframe
          div.innerHTML = `<a class="file" href="${rawUrl}" target="viewer">${icons.file}${item.name}</a>`;
        }
        explorer.append(div);
      });

      if (explorer.innerHTML === "") {
        explorer.innerHTML = `<div class="loading">[ Directorio vacío ]</div>`;
      }
    }

    loadRepo();
  </script>
</body>

</html>
