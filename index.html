<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Repo Explorer</title>
  <style>
    body {
      font-family: sans-serif;
      background-color: #0d1117;
      color: #c9d1d9;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    .item {
      padding: 10px;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
    }

    .item:hover {
      background-color: #161b22;
    }

    .directory {
      font-weight: bold;
      color: #58a6ff;
      cursor: pointer;
    }

    .file {
      color: #8b949e;
      text-decoration: none;
    }

    .breadcrumb {
      margin-bottom: 20px;
      color: #8b949e;
    }

    .breadcrumb span {
      cursor: pointer;
      color: #58a6ff;
    }

    button {
      background: #238636;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Explorador de Repositorio</h2>
    <div id="breadcrumb" class="breadcrumb">/</div>
    <div id="explorer">Cargando archivos...</div>
  </div>

  <script>
    // Configuración del repositorio
    const USER = 'TU_USUARIO';
    const REPO = 'TU_REPOSIORIO';
    const BRANCH = 'master';

    let currentPath = "";

    async function loadRepo(path = "") {
      const explorer = document.getElementById('explorer');
      const breadcrumb = document.getElementById('breadcrumb');
      currentPath = path;

      // Actualizar Breadcrumb
      breadcrumb.innerHTML = `<span onclick="loadRepo('')">root</span> / ${path}`;

      try {
        const response = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${path}?ref=${BRANCH}`);
        const data = await response.json();

        explorer.innerHTML = "";

        if (path !== "") {
          const upDir = path.split('/').slice(0, -1).join('/');
          explorer.innerHTML += `<div class="item directory" onclick="loadRepo('${upDir}')">.. (Regresar)</div>`;
        }

        data.forEach(item => {
          const div = document.createElement('div');
          div.className = 'item';

          if (item.type === 'dir') {
            div.innerHTML = `<span class="directory" onclick="loadRepo('${item.path}')">📁 ${item.name}</span>`;
          } else {
            const url = `https://${USER}.github.io/${REPO}/${item.path}`;
            div.innerHTML = `<a class="file" href="${url}" target="_blank">📄 ${item.name}</a>`;
          }
          explorer.append(div);
        });
      } catch (error) {
        explorer.innerHTML = "Error al cargar los archivos. Revisa la configuración.";
      }
    }

    loadRepo();
  </script>

</body>

</html>
