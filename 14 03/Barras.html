<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
  <canvas id="myCanvas" width="500" height="500" style="border:4px solid black;"></canvas>

  <script>
    var canvas = document.getElementById("myCanvas");
    var ctx = canvas.getContext("2d");

    var datos = [100, 200, 300, 400, 500];
    var colores = ["#750202", "blue", "green", "orange", "purple"];
    var etiquetas = ["50%", "60%", "70%", "80%", "100%"];

    var x = 50;
    var width = 50;

    ctx.font = "14px 'JetBrainsMono Nerd Font', monospace";
    ctx.textAlign = "center";

    for (var i = 0; i < datos.length; i++) {

      var alturaVisual = datos[i] * 0.85;


      ctx.beginPath();
      ctx.rect(x, 500 - alturaVisual, width, alturaVisual);
      ctx.fillStyle = colores[i];
      ctx.fill();
      ctx.stroke();


      ctx.fillStyle = "black";
      ctx.fillText(etiquetas[i], x + (width / 2), 500 - alturaVisual - 10);

      x += width + 20;
    }
  </script>
</body>

</html>
