<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

  <h2>FIGURAS CENTRADAS CON DIVISIÓN</h2>
  <canvas id="myCanvas" width="500" height="500" style="border:4px solid black;"></canvas>

  <script>
    var canvas = document.getElementById("myCanvas");
    var ctx = canvas.getContext("2d");


    ctx.beginPath();
    ctx.rect(200, 30, 100, 100);
    ctx.fillStyle = "red";
    ctx.fill();
    ctx.stroke();


    ctx.beginPath();
    ctx.strokeStyle = "black";
    ctx.lineWidth = 2;
    ctx.moveTo(0, 250);
    ctx.lineTo(500, 250);
    ctx.stroke();


    ctx.beginPath();
    ctx.moveTo(250, 280);
    ctx.lineTo(350, 430);
    ctx.lineTo(150, 430);
    ctx.closePath();

    ctx.fillStyle = "blue";
    ctx.fill();

    ctx.lineWidth = 1;
    ctx.stroke();
  </script>

</body>

</html>
