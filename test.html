<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <link href="css/style.css" rel="stylesheet">
  <style>
    canvas {
      border: 2px solid;
      background-color: white;
    }
  </style>
</head>

<body>
  <canvas id="test" width="600" height="600">
    <script>
      var canvas = document.getElementById("test");
      var ctx = canvas.getContext("2d");


      ctx.beginPath();
      ctx.lineWidth = 2;
      ctx.strokeStyle = "red";
      ctx.rect(80, 80, 200, 100);
      ctx.stroke();

      ctx.beginPath();
      ctx.strokeStyle = "purple";
      ctx.arc(300, 300, 100, 0, 2 * Math.PI);
      ctx.stroke();

      ctx.beginPath();
      ctx.fillText("hola", 800, 200);
      ctx.fillText();

      ctx.stroke();
    </script>
  </canvas>
</body>





</html>
