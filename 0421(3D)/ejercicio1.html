<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
  </style>
</head>

<body>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

  <script>
    // configuracion de la escena
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x20232a);

    // posicion de la camera
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 5;

    // renderizador
    const renderer = new THREE.WebGLRenderer({antialias: true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // creando el cubo
    const geometry = new THREE.BoxGeometry(1, 1, 1);
    const material = new THREE.MeshNormalMaterial();
    const cubo = new THREE.Mesh(geometry, material);
    scene.add(cubo);

    // generando variable para el control de la animacion
    let velocidadTraslacion = 0.05;
    let direccion = 1; //+1 -1
    const limiteX = 3; // limite de bordes

    // generano animacion
    function animate() {
      requestAnimationFrame(animate);

      // movimiento de x
      cubo.position.x += velocidadTraslacion * direccion;

      // revertir si llega al limite
      if (cubo.position.x >= limiteX || cubo.position.x <= -limiteX) {
        direccion *= -1;
      }

      // Rotacion
      cubo.rotation.x += 0.01;
      cubo.rotation.y += 0.01;
      cubo.rotation.z += 0.01;

      renderer.render(scene, camera);
    }

    // 7. AJUSTE RESPONSIVO
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
  </script>
</body>

</html>
